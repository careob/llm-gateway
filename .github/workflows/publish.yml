name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Remove static auth so npm uses OIDC
        run: sed -i '/authToken/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
